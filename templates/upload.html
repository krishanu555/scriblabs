<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Mochi Print - Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .page-canvas { width: 100%; height: 100%; object-fit: contain; }
        .page-removed::after { content: "✕"; position: absolute; inset: 0; background: rgba(251, 219, 222, 0.8); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #a83836; font-weight: 900; z-index: 30; }
    </style>
</head>
<body class="bg-[#f8faf9] text-[#2d3433] min-h-screen flex flex-col antialiased">

    <header class="p-4 md:p-10 flex items-center justify-between max-w-5xl mx-auto w-full">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#2e695e] text-white rounded-full flex items-center justify-center shadow-lg"><span class="material-symbols-outlined">auto_awesome</span></div>
            <h1 class="text-xl font-extrabold text-[#2e695e]">Mochi Print</h1>
        </div>
        <button onclick="location.reload()" class="bg-white border px-4 py-2 rounded-full text-sm font-bold shadow-sm">Start Over</button>
    </header>

    <main class="flex-grow p-4 md:px-12 max-w-5xl mx-auto w-full flex flex-col gap-6">
        <h2 class="text-3xl md:text-5xl font-extrabold">Upload Files</h2>
        
        <input type="file" id="fileUploader" accept=".pdf" class="hidden">
        <div id="uploadBox" class="bg-white rounded-[2rem] p-10 md:p-20 flex flex-col items-center border-2 border-dashed border-[#2e695e]/30 cursor-pointer shadow-sm">
            <div class="w-20 h-20 bg-[#b2efe0] text-[#2e695e] rounded-full flex items-center justify-center mb-4"><span class="material-symbols-outlined text-4xl">upload_file</span></div>
            <h3 class="text-xl font-bold">Choose your PDF</h3>
        </div>

        <div id="printSettingsPanel" class="hidden flex-col gap-6 animate-pulse-once">
            <div class="bg-white rounded-[2rem] p-6 shadow-xl border border-gray-100 flex flex-col gap-6">
                <div class="flex items-center gap-4 p-4 bg-[#b2efe0]/20 rounded-2xl">
                    <span class="material-symbols-outlined text-[#2e695e]">picture_as_pdf</span>
                    <div class="overflow-hidden"><h4 id="fileNameDisplay" class="font-bold truncate">document.pdf</h4><p id="pageCountDisplay" class="text-xs text-[#2e695e] font-bold">Reading...</p></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="flex flex-col gap-2">
                        <span class="text-xs font-bold text-gray-400 uppercase">Copies</span>
                        <div class="flex items-center justify-between bg-gray-50 p-2 rounded-2xl border">
                            <button id="copyMinus" class="w-10 h-10 bg-white rounded-lg shadow-sm font-bold">-</button>
                            <span id="copyCount" class="font-black text-xl text-[#2e695e]">1</span>
                            <button id="copyPlus" class="w-10 h-10 bg-[#2e695e] text-white rounded-lg shadow-sm font-bold">+</button>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <span class="text-xs font-bold text-gray-400 uppercase">Color Mode</span>
                        <div class="flex bg-gray-50 p-1 rounded-2xl border h-full">
                            <button id="btnColor" class="flex-1 py-2 text-gray-500 font-bold rounded-xl transition-all">Color</button>
                            <button id="btnBW" class="flex-1 py-2 bg-[#2e695e] text-white font-bold rounded-xl shadow-md transition-all">B&W</button>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <span class="text-xs font-bold text-gray-400 uppercase">Print Range</span>
                        <div class="flex gap-2 h-full">
                            <div class="bg-gray-50 border rounded-2xl flex items-center px-4 flex-grow"><input type="text" id="pageRangeInput" value="All" class="bg-transparent border-none w-full font-bold text-sm focus:ring-0" readonly></div>
                            <button id="openRemoveModal" class="bg-[#2e695e] text-white px-4 rounded-2xl shadow-md"><span class="material-symbols-outlined">grid_view</span></button>
                        </div>
                    </div>
                </div>

                <button id="proceedToPayBtn" class="w-full py-5 bg-[#2e695e] text-white font-black text-xl rounded-2xl shadow-lg active:scale-95 transition-all">Proceed to Checkout</button>
            </div>
        </div>
    </main>

    <div id="removePagesModal" class="hidden fixed inset-0 bg-white md:bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white md:rounded-3xl w-full h-full md:max-w-6xl md:h-[85vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center shrink-0">
                <h2 class="text-xl font-black">Select Pages to Remove</h2>
                <button id="closeModalBtn" class="p-2"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div id="pageGrid" class="flex-grow p-4 overflow-y-auto bg-gray-50 grid grid-cols-2 md:grid-cols-5 gap-4"></div>
            <div class="p-4 bg-white border-t flex justify-between items-center shrink-0 shadow-lg">
                <div class="font-bold text-[#2e695e]">Final Print: <span id="modalFinalPages" class="text-2xl font-black">0</span></div>
                <button id="savePagesBtn" class="bg-[#2e695e] text-white px-8 py-3 rounded-xl font-bold active:scale-95">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let pdfDoc = null, totalPages = 0, removedPagesSet = new Set(), copies = 1, isColor = false;

        // DB save for checkout preview
        function saveToDB(buffer) {
            let req = indexedDB.open("MochiDB", 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore("files");
            req.onsuccess = e => e.target.result.transaction("files", "readwrite").objectStore("files").put(buffer, "pdf");
        }

        document.getElementById('uploadBox').onclick = () => document.getElementById('fileUploader').click();
        document.getElementById('fileUploader').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('fileNameDisplay').innerText = file.name;
            document.getElementById('uploadBox').classList.add('hidden');
            document.getElementById('printSettingsPanel').classList.replace('hidden', 'flex');
            
            const reader = new FileReader();
            reader.onload = function() {
                saveToDB(this.result);
                pdfjsLib.getDocument(new Uint8Array(this.result)).promise.then(pdf => {
                    pdfDoc = pdf; totalPages = pdf.numPages;
                    document.getElementById('pageCountDisplay').innerText = totalPages + " Pages Ready";
                    renderGrid();
                });
            };
            reader.readAsArrayBuffer(file);
        };

        function renderGrid() {
            const grid = document.getElementById('pageGrid'); grid.innerHTML = "";
            for(let i=1; i<=totalPages; i++) {
                const box = document.createElement('div');
                box.className = "relative border-2 rounded-xl aspect-[1/1.4] bg-white overflow-hidden";
                const canvas = document.createElement('canvas'); canvas.className = "page-canvas"; box.appendChild(canvas);
                const label = document.createElement('div'); label.className = "absolute bottom-0 w-full text-center py-1 bg-white/80 font-bold text-[10px]"; label.innerText = "Pg "+i; box.appendChild(label);
                
                box.onclick = () => {
                    if(removedPagesSet.has(i)) { removedPagesSet.delete(i); box.classList.remove('page-removed'); }
                    else { removedPagesSet.add(i); box.classList.add('page-removed'); }
                    document.getElementById('modalFinalPages').innerText = totalPages - removedPagesSet.size;
                };
                grid.appendChild(box);
                pdfDoc.getPage(i).then(p => {
                    const vp = p.getViewport({scale: 0.4}); canvas.height = vp.height; canvas.width = vp.width;
                    p.render({canvasContext: canvas.getContext('2d'), viewport: vp});
                });
            }
        }

        document.getElementById('copyPlus').onclick = () => { copies++; document.getElementById('copyCount').innerText = copies; };
        document.getElementById('copyMinus').onclick = () => { if(copies>1) copies--; document.getElementById('copyCount').innerText = copies; };
        document.getElementById('btnColor').onclick = () => { isColor = true; btnColor.className = "flex-1 py-2 bg-[#2e695e] text-white font-bold rounded-xl shadow-md"; btnBW.className = "flex-1 py-2 text-gray-500 font-bold rounded-xl"; };
        document.getElementById('btnBW').onclick = () => { isColor = false; btnBW.className = "flex-1 py-2 bg-[#2e695e] text-white font-bold rounded-xl shadow-md"; btnColor.className = "flex-1 py-2 text-gray-500 font-bold rounded-xl"; };
        document.getElementById('openRemoveModal').onclick = () => { document.getElementById('modalFinalPages').innerText = totalPages - removedPagesSet.size; document.getElementById('removePagesModal').classList.remove('hidden'); };
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('removePagesModal').classList.add('hidden');
        document.getElementById('savePagesBtn').onclick = () => { document.getElementById('removePagesModal').classList.add('hidden'); document.getElementById('pageRangeInput').value = `Custom (${totalPages - removedPagesSet.size})`; };

        document.getElementById('proceedToPayBtn').onclick = () => {
            localStorage.setItem('m_pages', totalPages - removedPagesSet.size);
            localStorage.setItem('m_orig', totalPages);
            localStorage.setItem('m_copies', copies);
            localStorage.setItem('m_color', isColor ? 'COLOR' : 'BW');
            localStorage.setItem('m_removed', JSON.stringify(Array.from(removedPagesSet)));
            location.href = "/checkout";
        };
    </script>
</body>
</html>
