<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0" name="viewport"/>
    <title>Mochi Print - Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .scroll-area { overflow-y: auto; scrollbar-width: none; }
        .bw-filter canvas { filter: grayscale(100%) contrast(1.1); }
    </style>
</head>
<body class="bg-[#f8faf9] text-[#2d3433] min-h-screen flex flex-col antialiased">
    <header class="p-4 md:p-6 flex items-center gap-4 max-w-7xl mx-auto w-full">
        <button onclick="history.back()" class="w-10 h-10 bg-white border rounded-full flex items-center justify-center shadow-sm"><span class="material-symbols-outlined">arrow_back</span></button>
        <h1 class="text-2xl font-black">Checkout</h1>
    </header>

    <main class="flex-grow p-4 md:px-12 pb-10 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-7 flex flex-col gap-3 h-[50vh] md:h-[75vh]">
            <h2 class="font-bold flex justify-between">Preview <span id="badge" class="bg-[#b2efe0] px-2 rounded-full text-xs">0 Pages</span></h2>
            <div id="container" class="bg-gray-100 rounded-[2rem] p-4 flex-1 scroll-area flex flex-col gap-4 items-center">
                <p class="mt-10 animate-pulse font-bold text-gray-400">Loading Memory...</p>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col justify-center">
            <div class="bg-white border rounded-[2rem] p-6 md:p-10 shadow-2xl flex flex-col gap-6">
                <h3 class="text-xl font-bold flex items-center gap-2"><span class="material-symbols-outlined">receipt_long</span> Detailed Bill</h3>
                <div class="bg-gray-50 p-6 rounded-2xl border flex flex-col gap-4">
                    <div class="flex justify-between font-bold"><span>Print Charge</span><span id="basePrice">₹0</span></div>
                    <div class="flex justify-between text-sm text-gray-500"><span id="typeDisplay">Type</span><span id="rateDisplay">(@ ₹0/pg)</span></div>
                    <div class="flex justify-between text-sm text-gray-500"><span>Platform Fee</span><span>₹5.00</span></div>
                    <div class="border-t border-dashed my-2"></div>
                    <div class="flex justify-between text-gray-500 text-sm"><span>GST (18%)</span><span id="gst">₹0</span></div>
                    <div class="flex justify-between items-end"><span class="font-bold text-gray-500">Total</span><span id="total" class="text-4xl font-black text-[#2e695e]">₹0</span></div>
                </div>
                <button id="payBtn" class="w-full py-5 bg-[#2e695e] text-white font-black text-xl rounded-2xl shadow-xl active:scale-95 transition-all">Pay & Print</button>
            </div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        const pages = +localStorage.getItem('m_pages'), orig = +localStorage.getItem('m_orig'), copies = +localStorage.getItem('m_copies'), color = localStorage.getItem('m_color'), removed = new Set(JSON.parse(localStorage.getItem('m_removed')));
        const rate = (color === 'COLOR' ? 5 : 2); const base = pages * copies * rate; const total = (base + 5) * 1.18;

        document.getElementById('badge').innerText = pages + " Pages";
        document.getElementById('basePrice').innerText = "₹" + base.toFixed(2);
        document.getElementById('typeDisplay').innerText = "Type (" + color + ")";
        document.getElementById('rateDisplay').innerText = "(@ ₹" + rate + "/pg)";
        document.getElementById('gst').innerText = "₹" + ((base + 5) * 0.18).toFixed(2);
        document.getElementById('total').innerText = "₹" + total.toFixed(2);
        if(color !== 'COLOR') document.getElementById('container').classList.add('bw-filter');

        // Render Preview
        indexedDB.open("MochiDB", 1).onsuccess = e => {
            e.target.result.transaction("files").objectStore("files").get("pdf").onsuccess = ev => {
                pdfjsLib.getDocument(new Uint8Array(ev.target.result)).promise.then(pdf => {
                    const container = document.getElementById('container'); container.innerHTML = "";
                    for(let i=1; i<=orig; i++) {
                        if(removed.has(i)) continue;
                        const wrap = document.createElement('div'); wrap.className = "w-full bg-white shadow rounded-lg aspect-[1/1.414] relative";
                        const canvas = document.createElement('canvas'); canvas.className = "w-full h-full object-contain"; wrap.appendChild(canvas);
                        container.appendChild(wrap);
                        pdf.getPage(i).then(p => {
                            const vp = p.getViewport({scale: 1.0}); canvas.height = vp.height; canvas.width = vp.width;
                            p.render({canvasContext: canvas.getContext('2d'), viewport: vp});
                        });
                    }
                });
            };
        };

        // 💳 Razorpay Logic
        document.getElementById('payBtn').onclick = () => {
            const options = {
                "key": "rzp_test_XXXXXXXXXXXXXX", // 🛑 Test Key bosabi
                "amount": total.toFixed(2) * 100,
                "currency": "INR", "name": "Mochi Print",
                "handler": function(res) {
                    document.getElementById('payBtn').innerText = "Printing...";
                    fetch('/print_document', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({payment_id: res.razorpay_payment_id, copies: copies, color_mode: color})
                    }).then(() => alert("🎉 Success! Check Printer."));
                }
            };
            new Razorpay(options).open();
        };
    </script>
</body>
</html>
