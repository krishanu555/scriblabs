<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Mochi Print - Authentication</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "tertiary-container": "#b6dffd", "error-container": "#fa746f", "surface-tint": "#2e695e",
                "surface-dim": "#d4dbda", "secondary-dim": "#644d50", "tertiary-fixed": "#b6dffd",
                "on-surface": "#2d3433", "surface-bright": "#f8faf9", "primary": "#2e695e",
                "on-primary-fixed-variant": "#2a655a", "on-tertiary-fixed": "#0f3e56", "error-dim": "#67040d",
                "on-tertiary-fixed-variant": "#325a74", "surface": "#f8faf9", "error": "#a83836",
                "on-background": "#2d3433", "inverse-on-surface": "#9b9d9d", "surface-container-low": "#f1f4f3",
                "primary-dim": "#205c52", "surface-container": "#eaefee", "surface-container-high": "#e4e9e8",
                "surface-container-highest": "#dde4e3", "on-surface-variant": "#596060", "on-tertiary-container": "#27516a",
                "primary-fixed": "#b2efe0", "outline-variant": "#acb3b2", "on-primary-container": "#1e5b50",
                "on-secondary-container": "#634c4f", "secondary-fixed": "#fbdbde", "secondary-fixed-dim": "#eccdd0",
                "on-secondary-fixed-variant": "#6d5658", "inverse-primary": "#c0fdee", "background": "#f8faf9",
                "on-primary-fixed": "#00483e", "secondary-container": "#fbdbde", "primary-container": "#b2efe0",
                "tertiary-dim": "#2e5770", "on-secondary": "#fff7f7", "surface-container-lowest": "#ffffff",
                "inverse-surface": "#0b0f0f", "surface-variant": "#dde4e3", "tertiary": "#3b637d",
                "secondary": "#71595c", "on-primary": "#e3fff7", "primary-fixed-dim": "#a4e0d2",
                "on-secondary-fixed": "#4f3a3c", "on-error": "#fff7f6", "on-tertiary": "#f5f9ff",
                "on-error-container": "#6e0a12", "outline": "#757c7b", "tertiary-fixed-dim": "#a8d1ef"
            },
            "borderRadius": { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
            "fontFamily": { "headline": ["Plus Jakarta Sans"], "body": ["Plus Jakarta Sans"], "label": ["Plus Jakarta Sans"] }
          }
        }
      }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* 🚨 Error Shake Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }
        /* 🚨 Error Visual State */
        .error-state {
            outline: 2px solid #a83836 !important; 
            color: #a83836 !important;
            background-color: #fbdbde !important; 
        }
        /* Hide number spin buttons in browsers */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-surface">
    <div class="absolute top-[-15%] left-[-10%] w-[40vw] h-[40vw] bg-primary-container rounded-full blur-[100px] opacity-60 pointer-events-none"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] bg-tertiary-container rounded-full blur-[120px] opacity-40 pointer-events-none"></div>

    <main class="relative z-10 w-full max-w-[28rem] px-6">
        <div class="bg-surface-container-lowest rounded-xl p-10 flex flex-col items-center text-center shadow-[0_12px_40px_rgba(45,52,51,0.06)] border border-outline-variant/10">
            <div class="w-24 h-24 bg-primary-container rounded-full flex items-center justify-center mb-6">
                <span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">print</span>
            </div>

            <h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-2">Hello there!</h1>
            <p class="font-body text-lg text-on-surface-variant mb-10">Enter your PIN to wake me up.</p>

            <div class="w-full mb-10">
                <div class="flex justify-center gap-4" id="pinContainer">
                    <input type="tel" maxlength="1" class="pin-box w-16 h-20 text-center text-3xl font-headline font-extrabold rounded-full outline-none transition-all duration-200 bg-surface-container-low text-on-surface caret-primary focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#f8faf9]" autofocus>
                    <input type="tel" maxlength="1" class="pin-box w-16 h-20 text-center text-3xl font-headline font-extrabold rounded-full outline-none transition-all duration-200 bg-surface-container-low text-on-surface caret-primary focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#f8faf9]">
                    <input type="tel" maxlength="1" class="pin-box w-16 h-20 text-center text-3xl font-headline font-extrabold rounded-full outline-none transition-all duration-200 bg-surface-container-low text-on-surface caret-primary focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#f8faf9]">
                    <input type="tel" maxlength="1" class="pin-box w-16 h-20 text-center text-3xl font-headline font-extrabold rounded-full outline-none transition-all duration-200 bg-surface-container-low text-on-surface caret-primary focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#f8faf9]">
                </div>
            </div>

            <div class="w-full flex items-center gap-4 mb-8">
                <div class="flex-1 h-[2px] bg-surface-container-high rounded-full"></div>
                <span class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold">or</span>
                <div class="flex-1 h-[2px] bg-surface-container-high rounded-full"></div>
            </div>

            <button id="qrBtn" class="w-full bg-primary hover:bg-primary-dim text-on-primary rounded-full py-5 px-8 flex items-center justify-center gap-3 transition-colors duration-300 shadow-[0_8px_24px_rgba(46,105,94,0.15)] group">
                <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">qr_code_scanner</span>
                <span class="font-headline text-xl font-bold tracking-tight">Scan QR Code</span>
            </button>
        </div>
    </main>

    <footer class="absolute bottom-0 left-0 w-full p-8 flex justify-between items-center z-20">
        <button class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-low hover:bg-surface-container-high text-on-surface-variant transition-colors group shadow-sm">
            <span class="material-symbols-outlined text-lg">help</span>
            <span class="font-label text-sm font-semibold tracking-wide">Help</span>
        </button>
        <button class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-low hover:bg-surface-container-high text-on-surface-variant transition-colors group shadow-sm">
            <span class="material-symbols-outlined text-lg">language</span>
            <span class="font-label text-sm font-semibold tracking-wide">Language</span>
        </button>
    </footer>

    <script>
        const inputs = document.querySelectorAll('.pin-box');
        const container = document.getElementById('pinContainer');

        // Function to style filled boxes
        function updateFilledStyles() {
            inputs.forEach(input => {
                input.classList.remove('error-state'); // Clear error visually
                if (input.value) {
                    input.classList.add('bg-surface-container-lowest', 'text-primary', 'outline', 'outline-2', 'outline-primary', 'shadow-sm');
                    input.classList.remove('bg-surface-container-low', 'text-on-surface');
                } else {
                    input.classList.remove('bg-surface-container-lowest', 'text-primary', 'outline', 'outline-2', 'outline-primary', 'shadow-sm');
                    input.classList.add('bg-surface-container-low', 'text-on-surface');
                }
            });
        }

        // Logic for each box
        inputs.forEach((input, index) => {
            
            // Focus korle text auto select hoye jabe jate type korle replace hoy
            input.addEventListener('focus', (e) => {
                e.target.select(); 
            });

            input.addEventListener('input', (e) => {
                // Type korlei shake error bondho kora
                container.classList.remove('animate-shake'); 
                updateFilledStyles();

                // Jodi value thake ar ekhono last box na hoy, tahole next e jump kor
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }

                checkAutoSubmit();
            });

            // Keyboard Arrow ar Backspace Logic
            input.addEventListener('keydown', (e) => {
                // Remove error state quickly if user starts pressing keys
                container.classList.remove('animate-shake');

                if (e.key === 'Backspace') {
                    if (!input.value && index > 0) {
                        // Jodi current box khali thake ar backspace daabe, aager tay jabe
                        inputs[index - 1].focus();
                    }
                } else if (e.key === 'ArrowLeft' && index > 0) {
                    inputs[index - 1].focus();
                } else if (e.key === 'ArrowRight' && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
        });

        // 🚀 Auto Submit Logic (4te box fill hole eka eka execute korbe)
        function checkAutoSubmit() {
            const pin = Array.from(inputs).map(i => i.value).join('');
            if (pin.length === 4) {
                // Ektu delay na dile user bujhtei parbe na last digit ta ki chilo
                setTimeout(() => processLogin(pin), 100); 
            }
        }

        // Asol Login checking function
        function processLogin(pin) {
            if(pin === "1234") {
                window.location.href = "/upload";
            } else {
                // Error Animation
                container.classList.remove('animate-shake');
                void container.offsetWidth; 
                container.classList.add('animate-shake');
                
                inputs.forEach(b => b.classList.add('error-state'));

                setTimeout(() => {
                    inputs.forEach(input => input.value = "");
                    updateFilledStyles(); 
                    inputs[0].focus(); // Abar first box e return korano
                }, 800);
            }
        }

        // QR Button
        document.getElementById('qrBtn').addEventListener('click', () => {
            alert("Camera on hocche... (QR Scanner module lagate hobe)");
        });
    </script>
</body>
</html>
