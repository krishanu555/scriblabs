<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- Transactional Header: Minimal, focusing on the task -->
<header class="p-6 flex items-center gap-6 max-w-7xl mx-auto w-full">
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-low hover:bg-surface-container text-primary rounded-full transition-colors group">
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform">arrow_back</span>
</button>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">Print Settings</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 max-w-7xl mx-auto w-full px-6 pb-20 grid grid-cols-1 lg:grid-cols-12 gap-10">
<!-- Left Column: Document Preview (Asymmetric Focus) -->
<div class="lg:col-span-7 flex flex-col gap-6">
<!-- Preview Canvas with Soft Mint Border representation (Tonal Ring) -->
<div class="bg-surface-container-low rounded-xl p-8 md:p-12 flex-1 flex flex-col items-center justify-center relative overflow-hidden ring-4 ring-primary-container/40">
<!-- Decorative Metadata Tag -->
<div class="absolute top-6 left-6 bg-surface-container-lowest text-primary px-5 py-2.5 rounded-full text-sm font-bold flex items-center gap-2 shadow-[0_4px_20px_rgba(45,52,51,0.05)]">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">description</span>
                    annual_report_final.pdf
                </div>
<div class="absolute top-6 right-6 bg-primary-container text-on-primary-container px-4 py-2 rounded-full text-xs font-bold tracking-widest uppercase">
                    Page 1 of 12
                </div>
<!-- The Document Preview Paper -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-lg p-2 mt-12 aspect-[1/1.4] relative shadow-[0_12px_40px_rgba(45,52,51,0.08)] transform transition-transform hover:scale-[1.02] duration-500">
<img class="w-full h-full object-cover rounded-md opacity-90" data-alt="close up of a beautiful minimalist magazine layout with aesthetic typography and soft pastel imagery showing a clean editorial design" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDipGScpZhtS45ooVGTbtzBZsDkhnrD_oDO4c1u81xbv3o2opZ1fl6gZc6W9R73iiRDvXYHUPrgd-zgllY7kt8o_WeupZfzYbTV1azmgBW6W-fDIlU6rAxgw8AHe2TUDTEltPWCGyVxKqUYcYzKc1e7pLnHfNIgPuCt-vwaVbjgMLc1HpEro0fASEIPlcleNPZvp4G5atgXP_hn-4EVvmzvperttY3DZB9vo_9gIItO0zGxHEHT9Jyy-k9OdMYGwYtgHobImuQyPw"/>
<!-- Soft reflection overlay -->
<div class="absolute inset-0 bg-gradient-to-tr from-white/0 via-white/10 to-white/30 rounded-lg pointer-events-none"></div>
</div>
</div>
</div>
<!-- Right Column: Settings & Checkout Panel -->
<div class="lg:col-span-5 flex flex-col gap-8">
<!-- Settings Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_12px_40px_rgba(45,52,51,0.03)] flex flex-col gap-10">
<!-- Copies Selector -->
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="font-headline text-lg font-bold text-on-surface">Copies</span>
<span class="text-sm text-on-surface-variant">Number of sets</span>
</div>
<div class="flex items-center gap-3 bg-surface-container-low rounded-full p-1.5">
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-lowest text-on-surface-variant rounded-full shadow-sm hover:text-primary transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="font-headline font-extrabold text-2xl w-10 text-center text-primary">3</span>
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-lowest text-primary rounded-full shadow-sm hover:bg-primary-container hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Color Mode Toggle -->
<div class="flex flex-col gap-5">
<div class="flex flex-col">
<span class="font-headline text-lg font-bold text-on-surface">Color Mode</span>
<span class="text-sm text-on-surface-variant">Choose ink type</span>
</div>
<div class="flex gap-3 bg-surface-container-low p-2 rounded-full relative">
<!-- Active Button -->
<button class="flex-1 py-4 px-6 bg-primary-container text-on-primary-container font-bold rounded-full flex items-center justify-center gap-3 shadow-[0_4px_12px_rgba(46,105,94,0.1)] transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">palette</span>
                            Full Color
                        </button>
<!-- Inactive Button -->
<button class="flex-1 py-4 px-6 text-on-surface-variant font-medium rounded-full flex items-center justify-center gap-3 hover:bg-surface-container transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">contrast</span>
                            B&amp;W
                        </button>
</div>
</div>
</div>
<!-- Checkout Summary Card -->
<div class="bg-surface-container-low rounded-xl p-8 flex flex-col gap-8 relative overflow-hidden">
<!-- Decorative background blob for "Airy" feel -->
<div class="absolute -top-12 -right-12 w-48 h-48 bg-primary-container/30 rounded-full blur-3xl pointer-events-none"></div>
<h2 class="font-headline text-xl font-bold text-on-surface relative z-10">Order Summary</h2>
<div class="flex flex-col gap-6 text-base relative z-10">
<div class="flex justify-between items-center text-on-surface-variant">
<span class="font-medium">Document Print (12 pgs) x3</span>
<span class="font-bold text-on-surface">$3.60</span>
</div>
<div class="flex justify-between items-center text-on-surface-variant">
<span class="font-medium">Full Color Premium</span>
<span class="font-bold text-on-surface">$1.20</span>
</div>
<div class="flex justify-between items-center text-on-surface-variant">
<span class="font-medium">Service Tax</span>
<span class="font-bold text-on-surface">$0.34</span>
</div>
</div>
<!-- Tonal Separation via space, no lines -->
<div class="pt-6 mt-2 flex justify-between items-end relative z-10">
<span class="font-bold text-on-surface-variant mb-1">Total Due</span>
<span class="font-headline text-[3.5rem] leading-none tracking-tight font-extrabold text-primary">$5.14</span>
</div>
<div class="flex flex-col gap-4 mt-4 relative z-10">
<button class="w-full py-5 rounded-full bg-gradient-to-br from-primary to-primary-container text-surface-bright font-bold text-xl flex items-center justify-center gap-3 shadow-[0_12px_30px_rgba(46,105,94,0.25)] hover:scale-[0.98] active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">contactless</span>
                        Pay &amp; Print
                    </button>
<p class="text-center text-sm font-medium text-on-surface-variant uppercase tracking-widest mt-2">
                        Tap device to pay
                    </p>
</div>
</div>
</div>
